name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # Job name is referenced by the branch-protection required check (see quickstart).
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node 24.18.0
        uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: pnpm

      # mongodb-memory-server downloads a mongod binary on install; cache it.
      - name: Cache mongod binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-memory-server
          key: ${{ runner.os }}-mongod-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install (frozen lockfile, approved native builds)
        run: pnpm install --frozen-lockfile

      - name: Build shared contracts
        run: pnpm --filter @famifinances/contracts build

      # Type check + lint fan out across the workspace (API, mobile, contracts),
      # so both apps are exercised (FR-009, SC-007).
      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      # QLT-01 (FR-004): BLOCK on a high/critical advisory in the deployed apps/api production
      # dependency set; mobile + devDependency advisories are reported (non-blocking). Accepted
      # risks live in package.json `pnpm.auditConfig` + docs/security-checklist.md §4.2.
      - name: Dependency audit (deployed API)
        run: node scripts/audit-api.mjs

      # QLT-01: one instrumented run covers unit + e2e AND enforces the high-risk coverage
      # floor (FR-006). A bounded step-level retry (each attempt a fresh process) absorbs the
      # residual environmental e2e flake — including the rare setup/beforeAll failure that
      # jest.retryTimes cannot catch — so CI is green in practice while a real defect (failing
      # every attempt) still fails. See docs/quality-gates.md → "Known issue".
      - name: Test + coverage (unit + e2e, high-risk ≥ 90% / branches ≥ 80%)
        run: |
          for attempt in 1 2 3; do
            pnpm --filter @famifinances/api test:cov && exit 0
            echo "::warning::test:cov attempt $attempt failed (environmental e2e flake); retrying in a fresh process"
          done
          exit 1

      # SC-005: mobile unit tests (SessionContext, password policy, token interceptor)
      # must pass in CI. jsdom/node-only suite — no device or emulator required.
      - name: Test (mobile unit)
        run: pnpm --filter @famifinances/mobile test

      - name: Build (API)
        run: pnpm --filter @famifinances/api build
